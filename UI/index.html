<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python OOP Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>Calculator</h1>

        <div class="input-group">
            <label for="expression">Expression:</label>
            <input
                type="text"
                id="expression"
                placeholder="Try: 2+3, 2**3, sin(pi/2), log(100), cube(5), root(27,3)"
                autocomplete="off"
            >
            <div class="operation-info">
                Supports: + - * / **<br>
                Functions: log(x), log10(x), ln(x), exp(base,exp)<br>
                Trig: sin(x), cos(x)<br>
                Other: sqrt(x), root(x,degree), cube(x)<br>
                Parentheses for grouping
            </div>
        </div>

        <div class="button-group">
            <button class="calculate-btn" id="calculateBtn">Calculate</button>
            <button class="clear-btn" id="clearBtn">Clear</button>
        </div>

        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="result-label">Result</div>
            <div class="result-value" id="resultValue">-</div>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
